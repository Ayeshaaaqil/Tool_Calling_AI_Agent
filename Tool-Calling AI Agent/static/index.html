<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool-Calling AI Agent Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Smooth transitions */
        .transition-all { transition: all 0.3s ease; }
        /* Custom scrollbar for raw JSON */
        pre::-webkit-scrollbar { width: 6px; height: 6px; }
        pre::-webkit-scrollbar-thumb { background-color: #4b5563; border-radius: 3px; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans min-h-screen flex items-center justify-center p-4">

    <!-- Main Container with Gradient Border Effect -->
    <div class="relative max-w-2xl w-full p-8 bg-slate-900/80 rounded-3xl shadow-[0_0_60px_-10px_rgba(56,189,248,0.15)] border border-slate-800 backdrop-blur-sm">
        
        <!-- Subtle Glow Top Right -->
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-sky-500/10 rounded-full blur-3xl pointer-events-none"></div>

        <header class="text-center mb-10 relative">
            <div class="inline-flex items-center px-4 py-1.5 rounded-full bg-sky-500/10 border border-sky-500/20 text-sky-400 text-xs font-medium mb-4">
                <i class="fas fa-bolt mr-2"></i> Real-time Tool Calling
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight text-white">
                Nexe<span class="bg-gradient-to-r from-sky-400 to-emerald-400 bg-clip-text text-transparent">Agent</span>
            </h1>
            <p class="text-slate-400 mt-3 text-lg">Your intelligent assistant powered by Python tools</p>
        </header>

        <!-- Input Section -->
        <div class="space-y-5">
            <div class="relative group">
                <div class="absolute -inset-0.5 bg-gradient-to-r from-sky-500 to-emerald-500 rounded-2xl blur opacity-20 group-focus-within:opacity-40 transition-all"></div>
                <div class="relative">
                    <input id="userInput" type="text" placeholder="Ask: 'What is the weather in Paris?'" 
                    class="w-full p-5 pl-6 pr-28 bg-slate-950/60 border border-slate-800 rounded-2xl focus:ring-2 focus:ring-sky-500/50 outline-none transition-all text-white placeholder:text-slate-600 text-base shadow-inner">
                    
                    <!-- Updated Button with Loading State -->
                    <button id="runBtn" onclick="runAgent()" class="absolute right-3 top-3 bottom-3 bg-sky-600 hover:bg-sky-500 px-6 rounded-xl font-semibold transition-all flex items-center justify-center text-white min-w-[80px]">
                        <span id="btnText">Run</span>
                        <!-- Spinner (Hidden) -->
                        <svg id="spinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Suggestion Chips (UX Fix) -->
            <div class="flex flex-wrap gap-2.5 text-xs text-slate-400 pt-1 pl-1">
                <span>Try:</span>
                <button onclick="setQuery('Weather in Karachi 🇵🇰')" class="bg-slate-800/60 hover:bg-slate-800 px-3.5 py-1.5 rounded-full border border-slate-700/50 transition-all">Weather in Karachi 🇵🇰</button>
                <button onclick="setQuery('Search top AI trends 2024 🤖')" class="bg-slate-800/60 hover:bg-slate-800 px-3.5 py-1.5 rounded-full border border-slate-700/50 transition-all">Search AI trends 🤖</button>
            </div>
        </div>

        <!-- Result Section -->
        <div id="resultBox" class="mt-10 border-t border-slate-800/50 pt-8 hidden opacity-0 transition-all">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-lg font-semibold text-white flex items-center tracking-tight">
                    <i class="fas fa-robot text-sky-400 mr-3 text-xl"></i> Agent Execution
                </h2>
                <!-- Developer Mode Toggle -->
                <button onclick="toggleJson()" class="text-xs text-slate-500 hover:text-sky-400 transition-all">
                    <i class="fas fa-code mr-1.5"></i> <span id="toggleText">View Raw JSON</span>
                </button>
            </div>
            
            <!-- Professional Data Visualization Area -->
            <div id="visualOutput" class="space-y-5">
                <!-- Data will be injected here via JavaScript -->
            </div>

            <!-- Raw JSON Output (Developer Mode - Hidden by default) -->
            <div id="jsonWrapper" class="hidden mt-6">
                <pre id="jsonOutput" class="p-5 bg-black/50 rounded-xl border border-slate-800 text-emerald-400 overflow-x-auto text-xs font-mono shadow-inner"></pre>
            </div>
        </div>
    </div>

    <script>
        // Utility function to set input value
        function setQuery(query) {
            document.getElementById('userInput').value = query;
            document.getElementById('userInput').focus();
        }

        // Toggle visibility of raw JSON
        function toggleJson() {
            const wrapper = document.getElementById('jsonWrapper');
            const text = document.getElementById('toggleText');
            if (wrapper.classList.contains('hidden')) {
                wrapper.classList.remove('hidden');
                text.innerText = "Hide Raw JSON";
            } else {
                wrapper.classList.add('hidden');
                text.innerText = "View Raw JSON";
            }
        }

        // --- Core Agent Function ---
        async function runAgent() {
            const userInput = document.getElementById('userInput');
            const query = userInput.value;
            const resBox = document.getElementById('resultBox');
            const jsonOut = document.getElementById('jsonOutput');
            const visualOut = document.getElementById('visualOutput');
            
            // UI elements for loading state
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const runBtn = document.getElementById('runBtn');

            if(!query) return alert("Please enter a command");

            // --- UX Start Loading State ---
            runBtn.disabled = true;
            userInput.disabled = true;
            btnText.classList.add('hidden');
            spinner.classList.remove('hidden');
            runBtn.classList.add('bg-slate-700', 'cursor-not-allowed');
            runBtn.classList.remove('bg-sky-600', 'hover:bg-sky-500');

            // Reset and show result box with pulse animation
            resBox.classList.remove('hidden');
            setTimeout(() => resBox.classList.add('opacity-100'), 10);
            visualOut.innerHTML = `
                <div class="flex items-center space-x-4 p-5 bg-slate-950/40 rounded-2xl animate-pulse border border-slate-800">
                    <div class="rounded-full bg-slate-800 h-12 w-12"></div>
                    <div class="flex-1 space-y-2">
                        <div class="h-3 bg-slate-800 rounded w-3/4"></div>
                        <div class="h-3 bg-slate-800 rounded w-1/2"></div>
                    </div>
                </div>
            `;
            jsonOut.innerText = "Calling backend tool...";

            try {
                const response = await fetch('/api/agent', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query: query})
                });

                const data = await response.json();
                
                // Set Raw JSON
                jsonOut.innerText = JSON.stringify(data, null, 2);
                
                // --- Visual Data Injection (Professional UI Fix) ---
                if (data.status === 'success') {
                    if (data.tool === 'Weather') {
                        // Weather Card UI
                        visualOut.innerHTML = `
                            <div class="p-6 bg-gradient-to-br from-slate-950 to-slate-900 rounded-2xl border border-slate-800 shadow-xl">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="text-sm text-slate-500 flex items-center"><i class="fas fa-map-marker-alt mr-2 text-sky-400"></i> Tool: ${data.tool}</p>
                                        <h3 class="text-2xl font-bold text-white mt-1.5">${data.data.location}, ${data.data.country}</h3>
                                        <p class="text-slate-400 mt-1">${data.data.condition}</p>
                                    </div>
                                    <div class="text-6xl font-black bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">${data.data.temperature}</div>
                                </div>
                                <div class="mt-6 pt-5 border-t border-slate-800 grid grid-cols-2 gap-4 text-sm text-slate-400">
                                    <div class="flex items-center"><i class="fas fa-wind mr-2.5 text-slate-600"></i> Wind: ${data.data.windspeed}</div>
                                    <div class="flex items-center"><i class="fas fa-database mr-2.5 text-slate-600"></i> Source: ${data.data.source}</div>
                                </div>
                            </div>
                        `;
                    } else {
                        // Default Success UI
                        visualOut.innerHTML = `<div class="p-5 bg-emerald-950/30 text-emerald-300 rounded-2xl border border-emerald-900"><i class="fas fa-check-circle mr-2"></i> Task completed successfully using ${data.tool}. Check Raw JSON for details.</div>`;
                    }
                } else {
                    // Error UI
                    visualOut.innerHTML = `<div class="p-5 bg-red-950/30 text-red-300 rounded-2xl border border-red-900 font-medium"><i class="fas fa-exclamation-triangle mr-2.5"></i> Error: ${data.message}</div>`;
                }

            } catch (error) {
                visualOut.innerHTML = `<div class="p-5 bg-red-950/30 text-red-300 rounded-2xl border border-red-900 font-medium"><i class="fas fa-wifi mr-2.5"></i> Connection Error: Could not reach the agent.</div>`;
            } finally {
                // --- UX Stop Loading State ---
                runBtn.disabled = false;
                userInput.disabled = false;
                btnText.classList.remove('hidden');
                spinner.classList.add('hidden');
                runBtn.classList.remove('bg-slate-700', 'cursor-not-allowed');
                runBtn.classList.add('bg-sky-600', 'hover:bg-sky-500');
            }
        }
    </script>
</body>
</html>
